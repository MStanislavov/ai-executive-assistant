  <circle cx="32" cy="32" r="30" fill="#1e293b"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <!-- Stylized brain/network nodes -->
  <circle cx="24" cy="22" r="4" fill="#60a5fa"/>
  <circle cx="40" cy="22" r="4" fill="#60a5fa"/>
  <circle cx="32" cy="14" r="3" fill="#93c5fd"/>
  <circle cx="32" cy="32" r="5" fill="#3b82f6"/>
  <circle cx="20" cy="36" r="3" fill="#93c5fd"/>
  <circle cx="44" cy="36" r="3" fill="#93c5fd"/>
  <!-- Network connections -->
  <line x1="24" y1="22" x2="32" y2="14" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="22" x2="32" y2="14" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <line x1="24" y1="22" x2="32" y2="32" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="22" x2="32" y2="32" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="36" x2="32" y2="32" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="36" x2="32" y2="32" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <!-- Briefcase base -->
  <rect x="18" y="42" rx="2" ry="2" width="28" height="14" fill="#3b82f6"/>
  <rect x="26" y="39" rx="1" ry="1" width="12" height="5" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Briefcase clasp -->
  <rect x="29" y="47" width="6" height="4" rx="1" fill="#1e293b"/>
