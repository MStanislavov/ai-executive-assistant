<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Executive Assistant{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo"><a href="/" style="color: inherit; text-decoration: none;">AI Assistant</a></div>
        <div class="profile-switcher" id="profile-switcher">
            {% if profiles is defined and profiles|length > 0 %}
            <label style="font-size: 0.8rem; opacity: 0.7;">Profile</label>
            <select onchange="if(this.value) window.location.href='/profiles/'+this.value">
                <option value="">-- select --</option>
                {% for p in profiles %}
                <option value="{{ p.id }}" {% if profile is defined and profile and profile.id == p.id %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
            </select>
            {% endif %}
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            {% if profile is defined and profile %}
            <li><a href="/profiles/{{ profile.id }}">Profile</a></li>
            <li><a href="/profiles/{{ profile.id }}/runs">Runs</a></li>
            <li><a href="/profiles/{{ profile.id }}/opportunities">Opportunities</a></li>
            <li><a href="/profiles/{{ profile.id }}/cover-letters">Cover Letters</a></li>
            {% endif %}
            <li><a href="/policies">Policies</a></li>
        </ul>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <div id="toast" style="display:none; position:fixed; bottom:1rem; right:1rem; background:#166534; color:#fff; padding:0.75rem 1.25rem; border-radius:6px; z-index:999;"></div>
    <script>
    function showToast(msg, isError) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = isError ? '#991b1b' : '#166534';
        t.style.display = 'block';
        setTimeout(function(){ t.style.display = 'none'; }, 3000);
    }
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.successful && evt.detail.xhr && evt.detail.xhr.status >= 200 && evt.detail.xhr.status < 300) {
            if (evt.detail.elt && evt.detail.elt.dataset.successMsg) {
                showToast(evt.detail.elt.dataset.successMsg);
            }
        }
    });
    document.body.addEventListener('htmx:responseError', function(evt) {
        showToast('Error: ' + (evt.detail.xhr ? evt.detail.xhr.status : 'request failed'), true);
    });
    </script>
</body>
</html>
